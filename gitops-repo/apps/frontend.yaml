apiVersion: apps/v1
kind: Deployment
metadata:
        name: frontend
        namespace: apps
spec:
        replicas: 2
        selector:
                matchLabels:
                        app: frontend
        template:
                metadata:
                        labels:
                                app: frontend
                spec:
                        containers:
                        - name: frontend
                          image: dishaparikh98/frontend:latest-1
                          ports:
                          - containerPort: 3000
                          
                          env:
                          - name: BACKEND_URL
                            value: http://backend.apps:3000

---

apiVersion: v1
kind: Service

metadata:
        name: frontend
        namespace: apps
spec:
        type: Loadbalancer

        selector:
                app: frontend
        ports:
        - port: 80
          targetPort: 3000
