apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
        name: monitoring
        namespace: argocd
spec:
        project: default
        source:
                repoURL: https://github.com/Disha-Parikh/devops-ai-platform
                targetRevision: main
                path: github-repo/monitoring
        desitination:
                server: https://kubernetes.default.svc
                namespace: monitoring
        syncPolicy:
                automated:
                        prune: true
                        selfHeal: true
