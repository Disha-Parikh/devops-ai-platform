apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-ai-platform
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/Disha-Parikh/devops-ai-platform
    targetRevision: main
    path: gitops-repo/

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
