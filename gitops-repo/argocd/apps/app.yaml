apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
        name: apps
        namespace: argocd

spec:
        project: default

        source:
                repoURL: https://github.com/Disha-Parikh/devops-ai-platform
                targetRevision: main
                path: gitops-repo/apps
        destination:
                server: https://kubernetes.default.svc
                namespace: apps
        syncPolicy:
                automated:
                        prune: true
                        selfHeal: true
