apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-config
  namespace: observability

data:
  otel-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
          http:

    processors:
      batch:

    exporters:
      logging:
        loglevel: debug

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [logging]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability

spec:
  replicas: 1

  selector:
    matchLabels:
      app: otel-collector

  template:
    metadata:
      labels:
        app: otel-collector

    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector:0.88.0

        args:
        - "--config=/etc/otel-config.yaml"

        ports:
        - containerPort: 4317
        - containerPort: 4318

        volumeMounts:
        - name: config
          mountPath: /etc/otel-config.yaml
          subPath: otel-config.yaml

      volumes:
      - name: config
        configMap:
          name: otel-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability

spec:
  selector:
    app: otel-collector

  ports:
  - name: grpc
    port: 4317
  - name: http
    port: 4318
