apiVersion: v1
kind: Namespace
metadata:
  name: observability
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability

spec:
  replicas: 1

  selector:
    matchLabels:
      app: otel-collector

  template:
    metadata:
      labels:
        app: otel-collector

    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector:latest

        args:
        - "--config=/etc/otel-config.yaml"

        volumeMounts:
        - name: otel-config
          mountPath: /etc/otel-config.yaml
          subPath: otel-config.yaml

      volumes:
      - name: otel-config
        configMap:
          name: otel-config

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-config
  namespace: observability

data:
  otel-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
          http:

    exporters:
      logging:

    service:
      pipelines:
        traces:
          receivers: [otlp]
          exporters: [logging]
